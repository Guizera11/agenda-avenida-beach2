<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arena Avenida Beach — Disponibilidade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #4169e1;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
        }

        .header p {
            font-size: 13px;
            color: #ffffff;
            margin-top: 4px;
        }

        /* CALENDÁRIO */
        .calendario {
            background: white;
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
        }

        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .cal-header span {
            font-weight: 600;
            font-size: 15px;
            color: #1a1a2e;
        }

        .cal-nav {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #555;
            padding: 4px 8px;
            border-radius: 8px;
        }

        .cal-nav:hover {
            background: #0c46f7;
        }

        .cal-dias-semana {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 8px;
        }

        .cal-dias-semana span {
            font-size: 11px;
            color: #aaa;
            font-weight: 600;
            padding: 4px 0;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .cal-dia {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 13px;
            cursor: pointer;
            color: #333;
            transition: all 0.15s;
        }

        .cal-dia:hover {
            background: #e8f4fd;
        }

        .cal-dia.outro-mes {
            color: #ccc;
            pointer-events: none;
        }

        .cal-dia.hoje {
            font-weight: 700;
            color: #1a73e8;
        }

        .cal-dia.selecionado {
            background: #1a73e8;
            color: white;
            font-weight: 600;
        }

        .cal-dia.passado {
            color: #ddd;
            pointer-events: none;
        }

        /* HORÁRIOS */
        .card-horarios {
            background: white;
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .card-horarios h2 {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .horario-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 8px;
            background: #f8f9fa;
        }

        .horario-hora {
            font-weight: 600;
            font-size: 15px;
            color: #1a1a2e;
        }

        .horario-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .badge.disponivel {
            background: #e6f9f0;
            color: #1db954;
        }

        .badge.indisponivel {
            background: #fdecea;
            color: #e53935;
        }

        .vagas {
            font-size: 12px;
            color: #aaa;
        }

        .fechado {
            text-align: center;
            padding: 24px;
            color: #aaa;
            font-size: 14px;
        }

        .carregando {
            text-align: center;
            padding: 24px;
            color: #aaa;
        }

        .atualizacao {
            font-size: 11px;
            color: #bbb;
            text-align: center;
            margin-top: 16px;
        }

        .whatsapp-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #25d366;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .whatsapp-btn:hover {
            background: #20ba5a;
        }
    </style>
</head>

<body>

    <div class="header">
        <img src="/Logo_em_pdf_vetorizado2.png" alt="Arena Avenida Beach"
            style="width: 220px; filter: brightness(0) invert(1);" />
        <p style="color: white; margin-top: 8px;">Consulte a disponibilidade das quadras</p>
    </div>

    <div class="calendario">
        <div class="cal-header">
            <button class="cal-nav" id="btnAnterior">&#8249;</button>
            <span id="mesAno"></span>
            <button class="cal-nav" id="btnProximo">&#8250;</button>
        </div>
        <div class="cal-dias-semana">
            <span>Dom</span><span>Seg</span><span>Ter</span>
            <span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span>
        </div>
        <div class="cal-grid" id="calGrid"></div>
    </div>

    <div class="card-horarios" id="cardHorarios">
        <div class="carregando">Selecione uma data no calendário</div>
    </div>

    <script>
        const MESES = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
            "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

        let hoje = new Date();
        hoje.setHours(0, 0, 0, 0);
        let mesAtual = hoje.getMonth();
        let anoAtual = hoje.getFullYear();
        let dataSelecionada = null;

        function formatarData(d) {
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
        }

        function renderizarCalendario() {
            document.getElementById("mesAno").textContent = `${MESES[mesAtual]} ${anoAtual}`;
            const grid = document.getElementById("calGrid");
            grid.innerHTML = "";

            const primeiroDia = new Date(anoAtual, mesAtual, 1).getDay();
            const diasNoMes = new Date(anoAtual, mesAtual + 1, 0).getDate();

            // Dias do mês anterior
            for (let i = 0; i < primeiroDia; i++) {
                const div = document.createElement("div");
                div.className = "cal-dia outro-mes";
                grid.appendChild(div);
            }

            // Dias do mês atual
            for (let d = 1; d <= diasNoMes; d++) {
                const div = document.createElement("div");
                const dataAtual = new Date(anoAtual, mesAtual, d);
                dataAtual.setHours(0, 0, 0, 0);

                div.className = "cal-dia";
                div.textContent = d;

                if (dataAtual < hoje) div.classList.add("passado");
                if (dataAtual.getTime() === hoje.getTime()) div.classList.add("hoje");
                if (dataSelecionada && formatarData(dataAtual) === formatarData(dataSelecionada)) {
                    div.classList.add("selecionado");
                }

                div.addEventListener("click", () => {
                    dataSelecionada = dataAtual;
                    renderizarCalendario();
                    carregarHorarios(formatarData(dataAtual));
                });

                grid.appendChild(div);
            }
        }

        async function carregarHorarios(data) {
            const card = document.getElementById("cardHorarios");
            card.innerHTML = `<div class="carregando">Carregando...</div>`;

            try {
                const resp = await fetch(`/api/disponibilidade?data=${data}`);
                const dados = await resp.json();

                if (dados.erro) {
                    card.innerHTML = `<div class="fechado">Erro ao carregar. Tente novamente.</div>`;
                    return;
                }

                if (!dados.horarios || dados.horarios.length === 0) {
                    card.innerHTML = `<div class="fechado">🔒 Arena fechada neste dia</div>`;
                    return;
                }

                const agora = new Date().toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });

                let html = `<h2>Horários disponíveis</h2>`;
                const horaAtual = new Date().getHours();
                const ehHoje = dados.data === formatarData(new Date());

                dados.horarios.filter(h => {
                    if (!ehHoje) return true;
                    return parseInt(h.hora) >= horaAtual;
                }).forEach(h => {
                    const horaFim = String(parseInt(h.hora) + 1).padStart(2, "0") + ":00";
                    html += `
                        <div class="horario-item">
                            <div class="horario-hora">${h.hora}</div>
                            <div class="horario-info">
                                <span class="badge ${h.disponivel ? "disponivel" : "indisponivel"}">
                                ${h.disponivel ? "Disponível" : "Lotado"}
                                </span>
                            </div>
                        </div>`;
                });

                html += `<div class="atualizacao">Atualizado às ${agora}</div>`;
                card.innerHTML = html;

            } catch (err) {
                card.innerHTML = `<div class="fechado">Erro ao carregar. Tente novamente.</div>`;
            }
        }

        document.getElementById("btnAnterior").addEventListener("click", () => {
            mesAtual--;
            if (mesAtual < 0) { mesAtual = 11; anoAtual--; }
            renderizarCalendario();
        });

        document.getElementById("btnProximo").addEventListener("click", () => {
            mesAtual++;
            if (mesAtual > 11) { mesAtual = 0; anoAtual++; }
            renderizarCalendario();
        });

        renderizarCalendario();
        // Carrega hoje automaticamente
        dataSelecionada = hoje;
        renderizarCalendario();
        carregarHorarios(formatarData(hoje));
    </script>

    <a class="whatsapp-btn"
        href="https://wa.me/5548996997419?text=Olá!%20Gostaria%20de%20fazer%20uma%20reserva%20na%20Arena%20Avenida%20Beach!"
        target="_blank">

                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" />

        Reservar via WhatsApp
    </a>
</body>

</html>
