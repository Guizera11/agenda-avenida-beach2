<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arena Avenida Beach — Disponibilidade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #4169e1;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
        }

        .header p {
            font-size: 13px;
            color: #ffffff;
            margin-top: 4px;
        }

        /* CALENDÁRIO */
        .calendario {
            background: white;
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
        }

        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .cal-header span {
            font-weight: 600;
            font-size: 15px;
            color: #1a1a2e;
        }

        .cal-nav {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #555;
            padding: 4px 8px;
            border-radius: 8px;
        }

        .cal-nav:hover {
            background: #0c46f7;
        }

        .cal-dias-semana {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 8px;
        }

        .cal-dias-semana span {
            font-size: 11px;
            color: #aaa;
            font-weight: 600;
            padding: 4px 0;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .cal-dia {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 13px;
            cursor: pointer;
            color: #333;
            transition: all 0.15s;
        }

        .cal-dia:hover {
            background: #e8f4fd;
        }

        .cal-dia.outro-mes {
            color: #ccc;
            pointer-events: none;
        }

        .cal-dia.hoje {
            font-weight: 700;
            color: #1a73e8;
        }

        .cal-dia.selecionado {
            background: #1a73e8;
            color: white;
            font-weight: 600;
        }

        .cal-dia.passado {
            color: #ddd;
            pointer-events: none;
        }

        /* HORÁRIOS */
        .card-horarios {
            background: white;
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .card-horarios h2 {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .horario-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 8px;
            background: #f8f9fa;
        }

        .horario-hora {
            font-weight: 600;
            font-size: 15px;
            color: #1a1a2e;
        }

        .horario-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .badge.disponivel {
            background: #e6f9f0;
            color: #1db954;
        }

        .badge.indisponivel {
            background: #fdecea;
            color: #e53935;
        }

        .vagas {
            font-size: 12px;
            color: #aaa;
        }

        .fechado {
            text-align: center;
            padding: 24px;
            color: #aaa;
            font-size: 14px;
        }

        .carregando {
            text-align: center;
            padding: 24px;
            color: #aaa;
        }

        .atualizacao {
            font-size: 11px;
            color: #bbb;
            text-align: center;
            margin-top: 16px;
        }
    </style>
</head>

<body>

    <div class="header">
        <img src="/Logo_em_pdf_vetorizado2.png" alt="Arena Avenida Beach"
            style="width: 220px; filter: brightness(0) invert(1);" />
        <p style="color: white; margin-top: 8px;">Consulte a disponibilidade das quadras</p>
    </div>

    <div class="calendario">
        <div class="cal-header">
            <button class="cal-nav" id="btnAnterior">&#8249;</button>
            <span id="mesAno"></span>
            <button class="cal-nav" id="btnProximo">&#8250;</button>
        </div>
        <div class="cal-dias-semana">
            <span>Dom</span><span>Seg</span><span>Ter</span>
            <span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span>
        </div>
        <div class="cal-grid" id="calGrid"></div>
    </div>

    <div class="card-horarios" id="cardHorarios">
        <div class="carregando">Selecione uma data no calendário</div>
    </div>

    <script>
        const MESES = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
            "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

        let hoje = new Date();
        hoje.setHours(0, 0, 0, 0);
        let mesAtual = hoje.getMonth();
        let anoAtual = hoje.getFullYear();
        let dataSelecionada = null;

        function formatarData(d) {
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
        }

        function renderizarCalendario() {
            document.getElementById("mesAno").textContent = `${MESES[mesAtual]} ${anoAtual}`;
            const grid = document.getElementById("calGrid");
            grid.innerHTML = "";

            const primeiroDia = new Date(anoAtual, mesAtual, 1).getDay();
            const diasNoMes = new Date(anoAtual, mesAtual + 1, 0).getDate();

            // Dias do mês anterior
            for (let i = 0; i < primeiroDia; i++) {
                const div = document.createElement("div");
                div.className = "cal-dia outro-mes";
                grid.appendChild(div);
            }

            // Dias do mês atual
            for (let d = 1; d <= diasNoMes; d++) {
                const div = document.createElement("div");
                const dataAtual = new Date(anoAtual, mesAtual, d);
                dataAtual.setHours(0, 0, 0, 0);

                div.className = "cal-dia";
                div.textContent = d;

                if (dataAtual < hoje) div.classList.add("passado");
                if (dataAtual.getTime() === hoje.getTime()) div.classList.add("hoje");
                if (dataSelecionada && formatarData(dataAtual) === formatarData(dataSelecionada)) {
                    div.classList.add("selecionado");
                }

                div.addEventListener("click", () => {
                    dataSelecionada = dataAtual;
                    renderizarCalendario();
                    carregarHorarios(formatarData(dataAtual));
                });

                grid.appendChild(div);
            }
        }

        async function carregarHorarios(data) {
            const card = document.getElementById("cardHorarios");
            card.innerHTML = `<div class="carregando">Carregando...</div>`;

            try {
                const resp = await fetch(`/api/disponibilidade?data=${data}`);
                const dados = await resp.json();

                if (dados.erro) {
                    card.innerHTML = `<div class="fechado">Erro ao carregar. Tente novamente.</div>`;
                    return;
                }

                if (!dados.horarios || dados.horarios.length === 0) {
                    card.innerHTML = `<div class="fechado">🔒 Arena fechada neste dia</div>`;
                    return;
                }

                const agora = new Date().toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });

                let html = `<h2>Horários disponíveis</h2>`;
                dados.horarios.forEach(h => {
                    const horaFim = String(parseInt(h.hora) + 1).padStart(2, "0") + ":00";
                    html += `
            <div class="horario-item">
              <div class="horario-hora">${h.hora} – ${horaFim}</div>
              <div class="horario-info">
                ${h.vagasRestantes > 0 ? `<span class="vagas">${h.vagasRestantes} quadra${h.vagasRestantes > 1 ? "s" : ""} livre${h.vagasRestantes > 1 ? "s" : ""}</span>` : ""}
                <span class="badge ${h.disponivel ? "disponivel" : "indisponivel"}">
                  ${h.disponivel ? "Disponível" : "Lotado"}
                </span>
              </div>
            </div>`;
                });

                html += `<div class="atualizacao">Atualizado às ${agora}</div>`;
                card.innerHTML = html;

            } catch (err) {
                card.innerHTML = `<div class="fechado">Erro ao carregar. Tente novamente.</div>`;
            }
        }

        document.getElementById("btnAnterior").addEventListener("click", () => {
            mesAtual--;
            if (mesAtual < 0) { mesAtual = 11; anoAtual--; }
            renderizarCalendario();
        });

        document.getElementById("btnProximo").addEventListener("click", () => {
            mesAtual++;
            if (mesAtual > 11) { mesAtual = 0; anoAtual++; }
            renderizarCalendario();
        });

        renderizarCalendario();
        // Carrega hoje automaticamente
        dataSelecionada = hoje;
        renderizarCalendario();
        carregarHorarios(formatarData(hoje));
    </script>
</body>

</html>
